name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install project + test extras
        run: |
          uv sync --extra decompilers --extra llm --extra test
          uv pip install -e ".[test]"

      - name: Smoke test: --help works
        run: |
          python -m pyglimmer_stripper --help || python -m pyglimmer_toolkit --help

      - name: Run pytest
        run: |
          pytest -v --tb=short --maxfail=3
