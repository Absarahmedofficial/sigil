name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.5.0"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format (check)
        run: ruff format --check .

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mypy
        run: pip install "mypy>=1.10.0" pydantic typer rich
      - name: mypy
        run: mypy pyglimmer_stripper/ || mypy pyglimmer_toolkit/
