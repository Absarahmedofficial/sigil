name: release

# Build a Windows .exe via PyInstaller and publish a GitHub Release.
# PyPI distribution is handled by a separate job below (Trusted Publishing via OIDC).
#
# Note: the F-11 verification result means Nuitka is OFF the table (AGPL-3.0).
# PyInstaller 6.21.0 is the v1 + v1.1 .exe builder.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows-exe:
    name: build-windows-exe
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[decompilers,llm]"
          pip install pyinstaller==6.21.0

      - name: Build .exe via PyInstaller
        run: pyinstaller pyinstaller.spec --clean --noconfirm

      - name: List dist artifacts
        run: dir dist

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 dist/pyglimmer-stripper.exe | Out-File -Encoding utf8 dist/SHA256SUMS

      - name: Build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/pyglimmer-stripper.exe

      - name: Upload .exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyglimmer-stripper-windows-exe
          path: |
            dist/pyglimmer-stripper.exe
            dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/pyglimmer-stripper.exe
            dist/SHA256SUMS

  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/pyglimmer-stripper
    permissions:
      id-token: write  # Required for PyPI Trusted Publishing (OIDC).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        # No long-lived API token. PyPI Trusted Publishing uses an OIDC token
        # from the GitHub Actions environment, federated to the PyPI project.
        # See: https://docs.pypi.org/trusted-publishers/
